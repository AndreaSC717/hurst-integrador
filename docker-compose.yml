services:

  # ── Base de datos MySQL 8.4 ────────────────────────────────────────────────────
  db:
    image: mysql:8.4
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-husrt}
      MYSQL_USER:          ${MYSQL_USER:-husrt}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-husrt_secret}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/inicializacion-bd:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${MYSQL_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Aplicación JavaFX (escritorio vía noVNC) ───────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST:     db
      DB_PORT:     "3306"
      DB_NAME:     ${MYSQL_DATABASE:-husrt}
      DB_USER:     ${MYSQL_USER:-husrt}
      DB_PASSWORD: ${MYSQL_PASSWORD:-husrt_secret}
    ports:
      - "6080:6080"   # noVNC  → abrir http://localhost:6080/vnc.html
      - "5900:5900"   # VNC puro (opcional, ej. RealVNC Viewer)
    volumes:
      - fotos_data:/app/data/fotos-estudiantes

volumes:
  mysql_data:
  fotos_data:
